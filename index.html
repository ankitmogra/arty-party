// PBN CANVAS
// ═══════════════════════════════════════════════════
function PBNCanvas({scene}){
  const [cells,setCells]=useState({});
  const [selColor,setSelColor]=useState(null);
  const [won,setWon]=useState(false);
  const sz=scene.sz;
  const cellSz=Math.floor(240/sz);
  const paint=(idx)=>{
    if(!selColor||scene.flat[idx]===0)return;
    const nc={...cells,[idx]:selColor};
    setCells(nc);
    const allDone=scene.flat.every((z,i)=>z===0||nc[i]);
    if(allDone)setWon(true);
  };
  if(won)return(
    <div style={{textAlign:"center",padding:24,animation:"pop .4s ease"}}>
      <div style={{fontSize:60}}>🎉</div>
      <div style={{...fFredoka,fontSize:24,background:BRAND,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"8px 0"}}>Amazing Work!</div>
      <div style={{...fNunito,fontSize:14,color:"#666",marginBottom:16}}>You coloured the whole scene!</div>
      <button onClick={()=>{setCells({});setSelColor(null);setWon(false);}} style={{...fNunito,fontWeight:800,fontSize:14,padding:"10px 24px",borderRadius:20,border:"none",background:"#FF4757",color:"#fff",cursor:"pointer"}}>Paint Again 🎨</button>
    </div>
  );
  return(
    <div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12,justifyContent:"center"}}>
        {scene.pal.map((c,i)=>(
          <div key={i} onClick={()=>setSelColor(c)} style={{width:32,height:32,borderRadius:"50%",background:c,cursor:"pointer",border:selColor===c?"3px solid #333":"3px solid #fff",boxShadow:"0 2px 6px rgba(0,0,0,.2)",transform:selColor===c?"scale(1.22)":"scale(1)",transition:"transform .15s",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:c==='#FFFFFF'||c==='#FFE4EF'||c==='#E8F4FD'||c==='#FFE0C0'?"#333":"#fff"}}>
            {i+1}
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:`repeat(${sz},${cellSz}px)`,gap:2,margin:"0 auto",width:"fit-content"}}>
        {scene.flat.map((zone,idx)=>{
          const filled=cells[idx];
          const bg=filled||(zone===0?"#f0f0f0":"#fff");
          return(
            <div key={idx} onClick={()=>paint(idx)} style={{width:cellSz,height:cellSz,background:bg,border:"1px solid #ddd",borderRadius:2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:Math.max(8,cellSz*.3),fontWeight:700,color:filled?"transparent":"#aaa",cursor:zone===0?"default":"pointer",userSelect:"none"}}>
              {!filled&&zone!==0?zone:""}
            </div>
          );
        })}
      </div>
      {selColor&&<div style={{...fNunito,textAlign:"center",marginTop:8,fontSize:12,color:"#888"}}>Tap cells to paint! 🖌️</div>}
      {!selColor&&<div style={{...fNunito,textAlign:"center",marginTop:8,fontSize:12,color:"#888"}}>Pick a colour to start! 👆</div>}
      <button onClick={()=>{setCells({});setSelColor(null);}} style={{...fNunito,display:"block",margin:"12px auto 0",fontWeight:800,fontSize:13,padding:"8px 20px",borderRadius:16,border:"none",background:"#eee",color:"#666",cursor:"pointer"}}>Reset 🔄</button>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// TILE PUZZLE
// ═══════════════════════════════════════════════════
function TilePuzzle({pz,onSolve}){
  const diff=pz.diff;
  const sz=diff<=25?3:diff<=50?4:5;
  const total=sz*sz;
  const maxHints=diff<=50?2:1;
  const shuffle=useCallback(()=>{
    const a=Array.from({length:total-1},(_,i)=>i+1);a.push(0);
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  },[total]);
  const [tiles,setTiles]=useState(()=>shuffle());
  const [won,setWon]=useState(false);
  const [hints,setHints]=useState([]);
  const [hintsUsed,setHintsUsed]=useState(0);
  const [showHow,setShowHow]=useState(false);
  const tileSz=Math.floor(230/sz);
  const empty=tiles.indexOf(0);
  const move=(idx)=>{
    const er=Math.floor(empty/sz),ec=empty%sz,r=Math.floor(idx/sz),c=idx%sz;
    if(Math.abs(er-r)+Math.abs(ec-c)!==1)return;
    const nt=[...tiles];[nt[empty],nt[idx]]=[nt[idx],nt[empty]];
    setTiles(nt);
    const solved=nt.every((v,i)=>i===total-1?v===0:v===i+1);
    if(solved){setWon(true);onSolve();}
  };
  const getHint=()=>{
    if(hintsUsed>=maxHints){setHints(["No more hints! You can do it! 💪"]);return;}
    if(hintsUsed===0){
      let wrongIdx=-1;
      for(let i=0;i<total-1;i++){if(tiles[i]!==i+1){wrongIdx=i;break;}}
      if(wrongIdx===-1){setHints(["Almost solved! Keep going! 🌟"]);return;}
      const tileVal=tiles[wrongIdx];
      const correctPos=tileVal-1;
      const cr=Math.floor(correctPos/sz),cc=correctPos%sz;
      const wr=Math.floor(wrongIdx/sz),wc=wrongIdx%sz;
      let dir="";
      if(cr<wr)dir="up";else if(cr>wr)dir="down";else if(cc<wc)dir="left";else dir="right";
      setHints([`Tile ${tileVal} needs to go ${dir}! ↕️`]);
    } else {
      const er=Math.floor(empty/sz),ec=empty%sz;
      setHints([...hints,`Empty space is at row ${er+1}, column ${ec+1}! 📍`]);
    }
    setHintsUsed(h=>h+1);
  };
  const theme=PZ_THEMES.find(t=>t.id===pz.themeId)||PZ_THEMES[0];
  const emojis=PZ_SETS[pz.themeId]||PZ_SETS.animals;
  const tileEmoji=TILE_E[(pz.id-1)%25];
  if(won)return(
    <div style={{textAlign:"center",padding:32,animation:"pop .4s ease"}}>
      <div style={{fontSize:64}}>🏆</div>
      <div style={{...fFredoka,fontSize:24,background:BRAND,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"8px 0"}}>Puzzle Solved!</div>
      <div style={{...fNunito,fontSize:14,color:"#666",marginBottom:16}}>You're a puzzle champion! 🎉</div>
      <button onClick={()=>{setTiles(shuffle());setWon(false);setHints([]);setHintsUsed(0);}} style={{...fNunito,fontWeight:800,fontSize:14,padding:"10px 24px",borderRadius:20,border:"none",background:BRAND,color:"#fff",cursor:"pointer"}}>Play Again 🔄</button>
    </div>
  );
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:`repeat(${sz},${tileSz}px)`,gap:4,margin:"0 auto 16px",width:"fit-content"}}>
        {tiles.map((val,idx)=>(
          <div key={idx} onClick={()=>move(idx)} style={{width:tileSz,height:tileSz,background:val===0?"transparent":theme.bg,border:val===0?"none":`2px solid ${theme.color}`,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:tileSz*.35,cursor:val===0?"default":"pointer",boxShadow:val===0?"none":"0 2px 6px rgba(0,0,0,.1)",userSelect:"none",transition:"all .15s"}}>
            {val!==0?tileEmoji:""}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
        <button onClick={()=>{setTiles(shuffle());setHints([]);setHintsUsed(0);}} style={{...fNunito,fontWeight:800,fontSize:13,padding:"8px 16px",borderRadius:16,border:"none",background:"#eee",color:"#555",cursor:"pointer"}}>Reset 🔄</button>
        <button onClick={getHint} style={{...fNunito,fontWeight:800,fontSize:13,padding:"8px 16px",borderRadius:16,border:"none",background:"#FFF3E0",color:"#F59E0B",cursor:"pointer"}}>Hint 💡 ({maxHints-hintsUsed} left)</button>
        <button onClick={()=>setShowHow(true)} style={{...fNunito,fontWeight:800,fontSize:13,padding:"8px 16px",borderRadius:16,border:"none",background:"#E3F2FD",color:"#00B4D8",cursor:"pointer"}}>How to Play ❓</button>
      </div>
      {hints.map((h,i)=><div key={i} style={{...fNunito,fontSize:13,color:"#666",textAlign:"center",marginTop:8,padding:"8px 16px",background:"#FFF8E1",borderRadius:12}}>{h}</div>)}
      {showHow&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}} onClick={()=>setShowHow(false)}>
          <div style={{background:"#fff",borderRadius:20,padding:24,maxWidth:300,margin:16}} onClick={e=>e.stopPropagation()}>
            <div style={{...fFredoka,fontSize:20,textAlign:"center",marginBottom:12}}>How to Play 🧩</div>
            <div style={{...fNunito,fontSize:13,color:"#555",lineHeight:1.6,marginBottom:16}}>
              Tap tiles next to the empty space to slide them. Arrange all tiles in order from left to right, top to bottom!
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,48px)",gap:4,margin:"0 auto 16px",width:"fit-content"}}>
              {[1,2,3,4,0,5,7,8,6].map((v,i)=><div key={i} style={{width:48,height:48,background:v===0?"transparent":"#E3F2FD",border:v===0?"none":"2px solid #00B4D8",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{v!==0?"🌟":""}</div>)}
            </div>
            <button onClick={()=>setShowHow(false)} style={{...fNunito,fontWeight:800,display:"block",width:"100%",padding:"10px",borderRadius:16,border:"none",background:BRAND,color:"#fff",cursor:"pointer",fontSize:14}}>Got it! ✨</button>
          </div>
        </div>
      )}
    </div>
  );
}

        </div>
      );
    }
    const CRAFT_TABS=[{id:"diy",label:"DIY",emoji:"✂️"},{id:"origami",label:"Origami",emoji:"🦢"},{id:"quilling",label:"Quilling",emoji:"🌀"},{id:"pbn",label:"Paint by No.",emoji:"🖌️"},{id:"fav",label:"Saved",emoji:"❤️"}];
    return(
      <div className="scr" key="crafts-list" style={{height:"calc(100vh - 114px)",overflowY:"auto",paddingBottom:20}}>
        <Header title="✂️ Crafts Hub"/>
        <div style={{padding:"8px 12px 0"}}>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8}}>
            {CRAFT_TABS.map(t=>(
              <button key={t.id} onClick={()=>setCraftTab(t.id)} style={{...fNunito,fontWeight:800,fontSize:12,padding:"8px 14px",borderRadius:20,border:"none",background:craftTab===t.id?BRAND:craftTab===t.id?"":"#f0f0f0",color:craftTab===t.id?"#fff":"#666",cursor:"pointer",flexShrink:0,backgroundImage:craftTab===t.id?BRAND:"none"}}>{t.emoji} {t.label}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",padding:"4px 0 8px"}}>
            {DIFF_BTNS.map(d=>{
              const t=d!=="all"?TIERS[d]:null;
              return<button key={d} onClick={()=>setCraftDiff(d)} style={{...fNunito,fontWeight:800,fontSize:11,padding:"6px 12px",borderRadius:20,border:"none",background:craftDiff===d?(t?t.color:"#333"):"#f0f0f0",color:craftDiff===d?"#fff":"#666",cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>{t?`${t.emoji} ${t.label}`:"All"}</button>;
            })}
          </div>
          {craftList.length===0?<div style={{textAlign:"center",padding:32}}><div style={{fontSize:40}}>⭐</div><div style={{...fFredoka,fontSize:16,color:"#999",marginTop:8}}>None here!</div><div style={{...fNunito,fontSize:13,color:"#bbb",marginTop:4}}>Try a different filter!</div></div>:
          craftList.map(craft=>(
            <div key={craft.id} onClick={()=>setSelCraft(craft)} style={{background:craft.bg,borderRadius:16,padding:14,marginBottom:10,cursor:"pointer",transition:"transform .15s"}} onMouseDown={e=>e.currentTarget.style.transform="scale(.98)"} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
              <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{fontSize:42,flexShrink:0}}>{craft.emoji}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{...fFredoka,fontSize:15,color:"#333",flex:1}}>{craft.name}</div>
                    <button onClick={e=>{e.stopPropagation();setFavs(f=>{const nf=new Set(f);nf.has(craft.id)?nf.delete(craft.id):nf.add(craft.id);return nf;});}} style={{fontSize:16,background:"none",border:"none",cursor:"pointer",padding:2}}>{favs.has(craft.id)?"❤️":"🤍"}</button>
                  </div>
                  <div style={{...fNunito,fontSize:12,color:"#777",margin:"2px 0 4px"}}>{craft.outDesc.slice(0,50)}{craft.outDesc.length>50?"…":""}</div>
                  <DiffBar diff={craft.diff} slim/>
                  <div style={{display:"flex",gap:8,marginTop:6}}>
                    <span style={{...fNunito,fontSize:11,color:"#888"}}>⏱ {craft.time}</span>
                    <span style={{...fNunito,fontSize:11,color:"#FF6B9D"}}>❤️ {craft.likes}</span>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ── VIDEOS ────────────────────────────────────────
  const VideosScreen=()=>(
    <div className="scr" key="videos" style={{height:"calc(100vh - 114px)",overflowY:"auto",paddingBottom:20}}>
      <Header title="📹 Watch & Learn"/>
      <div style={{padding:"8px 12px 0"}}>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8}}>
          {VID_CATS.map(vc=>(
            <button key={vc.id} onClick={()=>setVidCat(vc.id)} style={{...fNunito,fontWeight:800,fontSize:12,padding:"8px 14px",borderRadius:20,border:"none",backgroundImage:vidCat===vc.id?BRAND:"none",background:vidCat===vc.id?"":"#f0f0f0",color:vidCat===vc.id?"#fff":"#666",cursor:"pointer",flexShrink:0}}>{vc.emoji} {vc.label}</button>
          ))}
        </div>
        {vidList.map(v=>(
          <a key={v.id} href={v.url} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",display:"block",marginBottom:10}}>
            <div style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,.06)"}}>
              <div style={{background:"#1a1a2e",height:90,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
                <span style={{fontSize:48}}>{v.emoji}</span>
                <div style={{position:"absolute",bottom:8,right:8,background:"#FF0000",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff"}}>▶</div>
                <div style={{position:"absolute",top:8,left:8,background:"#4ADE80",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700,color:"#fff",fontFamily:"Nunito"}}>Ages {v.age}</div>
              </div>
              <div style={{padding:"10px 12px"}}>
                <div style={{...fFredoka,fontSize:14,color:"#333",marginBottom:2}}>{v.title}</div>
                <div style={{...fNunito,fontSize:11,color:"#888",marginBottom:6}}>{v.ch}</div>
                <DiffBar diff={v.diff} slim/>
                <div style={{display:"flex",gap:8,marginTop:6}}>
                  <span style={{...fNunito,fontSize:11,color:"#666"}}>⏱ {v.dur}</span>
                  <span style={{...fNunito,fontSize:11,color:"#888"}}>👁 {v.views}</span>
                </div>
              </div>
            </div>
          </a>
        ))}
        <div style={{...fNunito,fontSize:12,color:"#888",textAlign:"center",padding:"12px 0"}}>{vidList.length} videos · All 100% kid-safe ✅ · Ages 4–12</div>
      </div>
    </div>
  );

  // ── PUZZLES ───────────────────────────────────────
  const PuzzlesScreen=()=>{
    if(selPz){
      return(
        <div className="scr" key={"pz-"+selPz.id} style={{height:"calc(100vh - 114px)",overflowY:"auto",paddingBottom:20}}>
          <Header title="🧩 Puzzle World"/>
          <div style={{padding:12}}>
            <button onClick={()=>setSelPz(null)} style={{...fNunito,fontWeight:800,fontSize:13,padding:"8px 16px",borderRadius:16,border:"none",background:"#f0f0f0",cursor:"pointer",marginBottom:12}}>← Back</button>
            <div style={{background:selPz.theme.bg,borderRadius:20,padding:16,textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:48,marginBottom:4}}>{selPz.emoji}</div>
              <div style={{...fFredoka,fontSize:20,color:selPz.theme.color}}>{selPz.label}</div>
              <DiffBar diff={selPz.diff}/>
            </div>
            <TilePuzzle pz={selPz} onSolve={()=>setDonePz(d=>{const nd=new Set(d);nd.add(selPz.id);return nd;})}/>
          </div>
        </div>
      );
    }
    return(
      <div className="scr" key="puzzles-list" style={{height:"calc(100vh - 114px)",overflowY:"auto",paddingBottom:20}}>
        <Header title="🧩 Puzzle World"/>
        <div style={{padding:"8px 12px 0"}}>
          <div style={{...fNunito,fontSize:13,fontWeight:700,color:"#888",textAlign:"center",marginBottom:8}}>{pzList.length} puzzles · 🏆 {donePz.size} solved!</div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>
            <button onClick={()=>setPzTheme("all")} style={{...fNunito,fontWeight:800,fontSize:11,padding:"6px 12px",borderRadius:20,border:"none",background:pzTheme==="all"?"#333":"#f0f0f0",color:pzTheme==="all"?"#fff":"#666",cursor:"pointer",flexShrink:0}}>All</button>
            {PZ_THEMES.map(t=>(
              <button key={t.id} onClick={()=>setPzTheme(t.id)} style={{...fNunito,fontWeight:800,fontSize:11,padding:"6px 12px",borderRadius:20,border:"none",background:pzTheme===t.id?t.color:"#f0f0f0",color:pzTheme===t.id?"#fff":"#666",cursor:"pointer",flexShrink:0}}>{t.emoji} {t.label}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",padding:"4px 0 8px"}}>
            {DIFF_BTNS.map(d=>{
              const t=d!=="all"?TIERS[d]:null;
              return<button key={d} onClick={()=>setPzDiff(d)} style={{...fNunito,fontWeight:800,fontSize:11,padding:"6px 12px",borderRadius:20,border:"none",background:pzDiff===d?(t?t.color:"#333"):"#f0f0f0",color:pzDiff===d?"#fff":"#666",cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>{t?`${t.emoji} ${t.label}`:"All"}</button>;
            })}
          </div>
          {pzList.length===0?<div style={{textAlign:"center",padding:32}}><div style={{fontSize:40}}>⭐</div><div style={{...fFredoka,fontSize:16,color:"#999",marginTop:8}}>None here!</div></div>:
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {pzList.map(pz=>{
              const solved=donePz.has(pz.id);
              return(
                <div key={pz.id} onClick={()=>setSelPz(pz)} style={{background:solved?"#E8F5E9":pz.theme.bg,borderRadius:14,padding:12,cursor:"pointer",textAlign:"center",border:solved?"2px solid #4ADE80":"2px solid transparent",position:"relative",transition:"transform .15s"}} onMouseDown={e=>e.currentTarget.style.transform="scale(.93)"} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
                  {solved&&<div style={{position:"absolute",top:4,right:4,fontSize:14}}>✅</div>}
                  <div style={{fontSize:28,marginBottom:4}}>{pz.emoji}</div>
                  <div style={{...fFredoka,fontSize:11,color:pz.theme.color,lineHeight:1.2}}>{pz.theme.label}</div>
                  <div style={{...fNunito,fontSize:10,color:"#888",marginTop:2}}>Lv.{pz.level}</div>
                  <DiffBar diff={pz.diff} slim/>
                </div>
              );
            })}
          </div>}
        </div>
      </div>
    );
  };

  // ── ARTY AI ───────────────────────────────────────
  const AIScreen=()=>{
    const PROMPTS=["Give me an easy craft idea! 🎨","How do I make origami? 🦢","What can I make with paper? 📄","Quilling tips for beginners! 🌀","Draw a cute animal with me! 🐶","Summer craft ideas please! ☀️"];
    return(
      <div className="scr" key="ai" style={{height:"calc(100vh - 114px)",display:"flex",flexDirection:"column"}}>
        <Header title="🤖 Arty AI"/>
        <div style={{flex:1,overflowY:"auto",padding:"12px 12px 0"}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start",marginBottom:10}}>
              {m.r==="a"&&<div style={{fontSize:24,marginRight:6,alignSelf:"flex-end"}}>🤖</div>}
              <div style={{...fNunito,fontSize:13,fontWeight:600,maxWidth:"78%",padding:"10px 14px",borderRadius:m.r==="u"?"18px 18px 4px 18px":"18px 18px 18px 4px",background:m.r==="u"?BRAND:"#f0f4ff",color:m.r==="u"?"#fff":"#333",lineHeight:1.5,backgroundImage:m.r==="u"?BRAND:"none"}}>{m.t}</div>
            </div>
          ))}
          {aiLoad&&<div style={{display:"flex",gap:6,padding:"8px 12px",alignItems:"center"}}>
            <div style={{fontSize:24}}>🤖</div>
            {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#C084FC",animation:`bounce 1s ease ${i*.2}s infinite`}}/>)}
          </div>}
          {msgs.length<=1&&(
            <div style={{padding:"8px 0"}}>
              <div style={{...fNunito,fontSize:12,color:"#aaa",marginBottom:8}}>Try asking:</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {PROMPTS.map((p,i)=>(
                  <button key={i} onClick={()=>setAiIn(p)} style={{...fNunito,fontWeight:700,fontSize:12,padding:"8px 12px",borderRadius:20,border:"2px solid #EDE9FE",background:"#f9f0ff",color:"#C084FC",cursor:"pointer"}}>{p}</button>
                ))}
              </div>
            </div>
          )}
          <div ref={aiEndRef}/>
        </div>
        <div style={{padding:12,borderTop:"1px solid #f0f0f0"}}>
          <div style={{...fNunito,fontSize:10,color:"#bbb",textAlign:"center",marginBottom:6}}>Powered by Claude ✨</div>
          <div style={{display:"flex",gap:8}}>
            <input value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendAI()} placeholder="Ask Arty anything crafty! 🎨" style={{...fNunito,flex:1,padding:"12px 16px",borderRadius:24,border:"2px solid #EDE9FE",fontSize:14,outline:"none",fontWeight:600}}/>
            <button onClick={sendAI} disabled={aiLoad||!aiIn.trim()} style={{...fNunito,width:46,height:46,borderRadius:"50%",border:"none",backgroundImage:BRAND,background:BRAND,color:"#fff",fontSize:18,cursor:"pointer",opacity:aiLoad||!aiIn.trim()?.45:1,flexShrink:0}}>✈️</button>
          </div>
        </div>
      </div>
    );
  };

  const screens={home:<HomeScreen/>,color:<ColourScreen/>,crafts:<CraftsScreen/>,videos:<VideosScreen/>,puzzles:<PuzzlesScreen/>,ai:<AIScreen/>};

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflow:"hidden"}} key={nav}>
        {screens[nav]}
      </div>
      {/* Bottom Nav */}
      <div className="np" style={{display:"flex",background:"#fff",borderTop:"1px solid #f0f0f0",padding:"8px 0 env(safe-area-inset-bottom,8px)",position:"relative",zIndex:10}}>
        {TABS.map(tab=>{
          const active=nav===tab.id;
          return(
            <button key={tab.id} onClick={()=>goNav(tab.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"4px 2px",transform:active?"scale(1.1)":"scale(1)",transition:"transform .15s"}}>
              <span style={{fontSize:20,filter:active?"none":"grayscale(.3)",opacity:active?1:.55}}>{tab.icon}</span>
              <span style={{...fNunito,fontSize:9,fontWeight:800,color:active?"#FF6B9D":"#bbb"}}>{tab.label}</span>
              {active&&<div style={{width:4,height:4,borderRadius:"50%",background:"#FF6B9D"}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
